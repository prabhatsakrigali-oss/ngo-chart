apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ngo-chart
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/prabhatsakrigali-oss/ngo-chart.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
