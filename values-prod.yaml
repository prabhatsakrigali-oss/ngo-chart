replicaCount: 5

image:
  repository: nginx
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  host: ngo.company.com

resources:
  requests:
    cpu: "500m"
    memory: "256Mi"

  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 5
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

config:
  appName: "NGO Management System"
  appEnv: "Production"

secret:
  dbUser: "prod_user"
  dbPassword: "prod_password"
  jwtSecret: "replace-with-real-secret"

persistence:
  enabled: true
  storageClass: standard
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /usr/share/nginx/html
