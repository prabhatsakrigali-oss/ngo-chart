apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-stress
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cpu-stress

  template:
    metadata:
      labels:
        app: cpu-stress

    spec:
      containers:
      - name: stress

        image: busybox

        command:
        - sh
        - -c
        - |
          while true
          do
            i=0
            while [ $i -lt 500000 ]
            do
              i=$((i+1))
            done
          done

        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"

          limits:
            cpu: "500m"
            memory: "128Mi"
