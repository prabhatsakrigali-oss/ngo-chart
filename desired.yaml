    helm.sh/chart: ngo-chart-1.0.0

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ngo-chart

  minReplicas: 2
  maxReplicas: 6

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 50
