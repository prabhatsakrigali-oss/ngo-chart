# Source: ngo-chart/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: ngo-chart

  labels:
    app.kubernetes.io/name: ngo-chart
    app.kubernetes.io/instance: ngo-chart
    app.kubernetes.io/version: 1.0.0
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: ngo-chart-1.0.0

spec:
  replicas: 5

  selector:
    matchLabels:
      app: ngo-chart

  template:
    metadata:
      annotations:
        checksum/config: 7abefa12c9b941b6d87d8110254679770ffbb9e676ae7fb9bae95101c12372b8

      labels:
        app: ngo-chart

    spec:
      serviceAccountName: ngo-chart-sa

      containers:
        - name: nginx
          image: "nginx:latest"
          imagePullPolicy: Always

          envFrom:
            - configMapRef:
                name: ngo-chart-config

            - secretRef:
                name: ngo-chart-secret

          ports:
            - containerPort: 80

          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 200m
              memory: 128Mi

          volumeMounts:
            - name: app-storage
              mountPath: /usr/share/nginx/html

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: ngo-chart-pvc
