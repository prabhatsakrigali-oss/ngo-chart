apiVersion: apps/v1
kind: Deployment

metadata:
  name: resource-demo
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: resource-demo

  template:
    metadata:
      labels:
        app: resource-demo

    spec:
      containers:
      - name: nginx
        image: nginx:latest 
      - name: nginx
        image: nginx:latest

        command:
        - /bin/sh
        - -c
        - |
          while true
          do
            i=0
            while [ $i -lt 1000000 ]
            do
              i=$((i+1))
            done
          done

        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "256Mi"

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "256Mi"

        ports:
        - containerPort: 80
