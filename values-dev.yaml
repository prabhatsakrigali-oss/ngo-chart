replicaCount: 2

image:
  repository: nginx
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  host: dev.ngo.local

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"

  limits:
    cpu: "200m"
    memory: "128Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50

config:
  appName: "NGO Management System"
  appEnv: "Development"

secret:
  dbUser: "dev_user"
  dbPassword: "dev_password"
  jwtSecret: "dev-secret-key"
