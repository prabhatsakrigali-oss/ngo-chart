apiVersion: v1
kind: Pod

metadata:
  name: "{{ .Release.Name }}-test"

  labels:
{{ include "ngo-chart.labels" . | indent 4 }}

  annotations:
    "helm.sh/hook": test

spec:
  restartPolicy: Never

  containers:
    - name: wget

      image: busybox

      command:
        - wget
        - "{{ include "ngo-chart.fullname" . }}:{{ .Values.service.port }}"
