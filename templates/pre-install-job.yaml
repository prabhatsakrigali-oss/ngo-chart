apiVersion: batch/v1
kind: Job

metadata:
  name: {{ .Release.Name }}-preinstall

  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

  labels:
{{ include "ngo-chart.labels" . | indent 4 }}

spec:

  ttlSecondsAfterFinished: 30

  template:

    metadata:
      name: preinstall

    spec:

      restartPolicy: Never

      containers:
      - name: preinstall

        image: busybox

        command:
          - sh
          - -c
          - echo "Running Pre-Install Hook..."
