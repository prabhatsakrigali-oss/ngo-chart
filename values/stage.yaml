replicaCount: 3

image:
  repository: nginx
  tag: latest
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 80

ingress:
  enabled: true
  className: nginx
  host: stage.ngo.local

resources:
  requests:
    cpu: "200m"
    memory: "128Mi"

  limits:
    cpu: "400m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

config:
  appName: "NGO Management System"
  appEnv: "Staging"

secret:
  dbUser: "stage_user"
  dbPassword: "stage_password"
  jwtSecret: "stage-secret-key"

persistence:
  enabled: true
  storageClass: standard
  accessMode: ReadWriteOnce
  size: 2Gi
  mountPath: /usr/share/nginx/html
